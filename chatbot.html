<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <title>RootNet | Chat with Us</title>
</head>
<body>
    
<div class="container py-4" style="max-width: 700px;">

  <h4 class="mb-3">💬 Chat Assistant</h4>

  <!-- Chat Window -->
  <div id="chatWindow" class="border rounded p-3 mb-3 bg-light"
       style="height: 400px; overflow-y: auto;">
    <!-- Messages appear here -->
    <div class="mb-2 text-muted">
      <strong>Bot:</strong> Hi! How can I help you today?
    </div>
  </div>

  <!-- FAQ Quick Buttons -->
  <div class="mb-3">
    <p class="text-muted small mb-1">Frequently Asked:</p>
    <button class="btn btn-outline-secondary btn-sm me-1 mb-1 faq-btn">
      What are your hours?
    </button>
    <button class="btn btn-outline-secondary btn-sm me-1 mb-1 faq-btn">
      How do I contact support?
    </button>
    <button class="btn btn-outline-secondary btn-sm me-1 mb-1 faq-btn">
      Where are you located?
    </button>
  </div>

  <!-- Input Area -->
  <div class="input-group">
    <input type="text" id="userInput" class="form-control"
           placeholder="Type your message...">
    <button class="btn btn-primary" id="sendBtn">Send</button>
  </div>

</div>

<script src="./script.js"></script>
</body>
</html>
